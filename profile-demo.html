<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectMIH - Profile Demo</title>
    <link rel="stylesheet" href="profile-demo.css">
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <h1>Profile</h1>
            <button class="nav-btn prev-btn" id="prevBtn">←</button>
            <button class="nav-btn next-btn" id="nextBtn">→</button>
        </div>

        <div class="profile-scroll">
            <div class="profile-card" id="profileCard">
                <!-- Dynamisch gefüllt von JavaScript -->
            </div>
        </div>

        <div class="profile-info">
            <div class="info-section" id="infoSection">
                <!-- Informationen scrollen hier -->
            </div>
        </div>

        <div class="profile-counter">
            <span id="currentProfile">1</span> / <span id="totalProfiles">0</span>
        </div>
    </div>

    <script src="profile-demo.js"></script>
</body>
</html>
